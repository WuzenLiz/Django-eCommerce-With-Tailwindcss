version: '3.8'
services:

  base: &base
    build: 
      context: .
      dockerfile: Dockerfile
    image: wuzen_sale_app
    platform: linux/amd64
    env_file: .env
    volumes:
      - .:/app


  saleapp_migration:
    <<: *base
    image: wuzen_sale_app
    command: ["sh", "-c", "python3 /app/manage.py makemigrations && python3 /app/manage.py migrate" ]
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  saleapp: 
    <<: *base
    image: wuzen_sale_app
    restart: on-failure
    #django runserver
    command: ["sh", "-c", "python3 /app/manage.py runserver 0.0.0.0:8000"]
    #gunicorn wsgi runserver
    # command: ["sh", "-c", "gunicorn mystore.wsgi:application --bind :8000 --workers 3 --reload"]
    volumes: 
      - .:/app
    ports: 
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy
      saleapp_migration:
        condition: service_completed_successfully
      saleapp_build_res:
        condition: service_completed_successfully
    env_file: .env

  saleapp_build_res:
    build: 
      context: .
      dockerfile: Dockerfile_Node
    image: wuzen_sale_app_build_res
    platform: linux/amd64
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: ["sh", "-c", "npm run build"]

  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - pgdb:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdb:
  node_modules:
  # redis:
